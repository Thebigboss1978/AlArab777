<!doctype html> <html lang="en"> <head> <meta charset="utf-8"> <meta name="viewport" content="width=device-width,initial-scale=1"> <title>Smart Start — Meet Point 777</title> <style> :root{--c:#0cf;--bg:#111;--fg:#fff} body{margin:0;font:500 15px/1.45 system-ui,-apple-system,Segoe UI,Roboto} .smartbar{position:sticky;top:0;z-index:999;background:var(--bg);color:var(--fg);padding:10px 14px;display:flex;gap:12px;align-items:center;justify-content:space-between} .btn{color:var(--c);text-decoration:none;border:1px solid var(--c);padding:6px 10px;border-radius:6px} .btn.primary{background:var(--c);color:#111} .hero{padding:28px 16px} .muted{opacity:.7} .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center} .chip{border:1px solid #ccc;border-radius:14px;padding:4px 10px;cursor:pointer} .box{border:1px solid #eee;border-radius:10px;padding:12px;margin-top:12px} </style> </head> <body> <div class="smartbar"> <span id="sb-text">Loading…</span> <div class="row"> <a id="sb-dir" class="btn" target="_blank">Directions</a> <a id="sb-wa" class="btn primary" target="_blank">WhatsApp</a> </div> </div> <section class="hero"> <h1 id="hero-title">Today in Giza — Sun, Feb 15, 2026</h1> <p id="hero-text" class="muted"></p> <div class="box"> <div class="row"> <strong>Preview language:</strong> <span class="chip" onclick="forceLang('en')">EN</span> <span class="chip" onclick="forceLang('fr')">FR</span> <span class="chip" onclick="forceLang('ar')">AR</span> <span class="chip" onclick="forceLang('auto')">AUTO</span> </div> <div class="row" style="margin-top:10px"> <small class="muted">Tip: بدّل المتغيرات اليومية بسرعة من هنا:</small> </div> <div class="row" style="margin-top:6px"> <label>Weather: <input id="w" value="clear & breezy"></label> <label>Holiday: <input id="h" value=""></label> <button onclick="refresh()" class="btn">Apply</button> </div> </div> </section> <script> const MEET_LINK = "https://maps.app.goo.gl/REPLACE_WITH_MEET_POINT_777"; const WA_LINK = "https://wa.me/REPLACE_WITH_NUMBER"; let forced = 'auto'; function pickLang(){ if(forced!=='auto') return forced; const pref = (navigator.languages && navigator.languages[0]) || navigator.language || 'en'; const p = pref.toLowerCase(); if(p.startsWith('fr')) return 'fr'; if(p.startsWith('ar')) return 'ar'; return 'en'; } function textPack(lang, weather, holiday){ const hasH = holiday && holiday.trim().length>0; const frH = hasH ? `Joyeuse ${holiday}. ` : ""; const enH = hasH ? `Happy ${holiday}. ` : ""; const arH = hasH ? `كل سنة وأنتم طيبين بمناسبة ${holiday}. ` : ""; const sb = { fr: `${frH}Météo à Gizah aujourd’hui: ${weather}. Point 777 (sécurisé): Entrée Middle East Hotel. À l’arrivée: “I’m here” + point bleu.`, en: `${enH}Giza today: ${weather}. Meet Point 777 (safe): Middle East Hotel entrance. On arrival: “I’m here” + blue dot.`, ar: `${arH}طقس الجيزة اليوم: ${weather}. نقطة التجمع 777 (آمنة): مدخل فندق الشرق الأوسط. لما توصل: "أنا وصلت" + سكرين للـ blue dot.` }; const hero = { fr: `Bienvenue à Gizeh. Envoyez: Nom + heure d’arrivée + personnes. Code 777 = priorité.`, en: `Welcome to Giza. Send: name + arrival time + people. Code 777 = priority.`, ar: `أهلاً بك في الجيزة. ابعت: الاسم + وقت الوصول + عدد الأشخاص. كود 777 = أولوية.` }; return {sb: sb[lang]||sb.en, hero: hero[lang]||hero.en}; } function render(){ const weather = document.getElementById('w').value || 'clear'; const holiday = document.getElementById('h').value || ''; const lang = pickLang(); const pack = textPack(lang, weather, holiday); document.getElementById('sb-text').textContent = pack.sb; document.getElementById('sb-dir').href = MEET_LINK; document.getElementById('sb-wa').href = WA_LINK; document.getElementById('hero-text').textContent = pack.hero; document.documentElement.lang = lang; document.getElementById('hero-title').textContent = 'Today in Giza — Sun, Feb 15, 2026'; } function refresh(){ render(); } function forceLang(l){ forced = l; render(); } render(); </script> </body> </html>
