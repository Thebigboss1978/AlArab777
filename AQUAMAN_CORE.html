<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUAMAN CORE | AlArab 777</title>
    <style>
        :root {
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
            --blur: blur(20px);
            --accent: #00d2ff;
        }
        body {
            margin: 0;
            background: #050505 url('https://w.wallhaven.cc/full/2e/wallhaven-2em99g.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #aquaman-shell {
            width: 90vw;
            height: 85vh;
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            position: relative;
        }
        #arsenal {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .tool-card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .tool-card:hover {
            background: rgba(255,255,255,0.2);
            border-color: var(--gold);
            transform: translateY(-5px);
        }
        #orb {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            border-radius: 50%;
            margin: auto;
            position: relative;
            box-shadow: 0 0 100px var(--gold);
            animation: pulse 4s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.1); opacity: 0.9; }
        }
        #status-hud {
            position: absolute;
            bottom: 40px;
            left: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        iframe {
            display: none; /* Background logic container */
        }
    </style>
</head>
<body>
    <div id="aquaman-shell">
        <header>
            <h1 style="margin:0; font-weight: 200; font-size: 3rem;">AQUAMAN <span style="color: var(--gold);">777</span></h1>
            <p style="opacity: 0.5;">Sovereign Command Center | Unified Spine</p>
        </header>

        <div id="orb"></div>

        <div id="arsenal">
            <div class="tool-card" onclick="window.open('http://localhost:3000')">🌐 CHATWOOT</div>
            <div class="tool-card" onclick="window.open('http://localhost:11434')">🧠 OLLAMA</div>
            <div class="tool-card" onclick="window.open('http://localhost:1234')">⚡ LM STUDIO</div>
            <div class="tool-card" onclick="window.open('http://localhost:8000')">👁️ GPT4ALL</div>
        </div>

        <div id="status-hud">
            <div id="state">STANDBY</div>
            <div id="persona" style="color: var(--gold);">MALIKA NASHMIAH</div>
        </div>
    </div>

    <!-- The Voice Interface flows through here as the hidden spine -->
    <iframe src="index.html" id="voice-spine"></iframe>

    <script>
        // Aquaman Still Healing Bridge
        const spine = document.getElementById('voice-spine').contentWindow;
        
        function syncState() {
            if (spine.currentState) {
                document.getElementById('state').innerText = spine.currentState;
                document.getElementById('persona').innerText = spine.AGENT_BRAIN?.name || 'INITIALIZING...';
            }
            requestAnimationFrame(syncState);
        }
        
        window.onload = () => {
            syncState();
            console.log("Aquaman Shell Active. Spine connected.");
        };
    </script>
</body>
</html>
