<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUAMAN CORE | AlArab 777</title>
    <style>
        :root {
            --gold: #d4af37;
            --glass: rgba(0, 0, 0, 0.4);
            --blur: blur(30px);
            --accent: #00d2ff;
        }
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Outfit', 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        #aquaman-shell {
            width: 95vw;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-shadow: 0 0 100px rgba(0,210,255,0.1);
            position: relative;
        }
        header h1 {
            font-size: 0.8rem; /* Small letters */
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            font-weight: 200;
            color: var(--gold);
            margin: 0;
        }
        #orb {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .orb-core {
            width: 150px;
            height: 150px;
            background: #000;
            border: 1px solid var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--gold);
            animation: breathe 5s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px var(--gold); }
            50% { transform: scale(1.05); box-shadow: 0 0 70px var(--gold); }
        }
        #arsenal {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tool-link {
            font-size: 0.6rem;
            text-decoration: none;
            color: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .tool-link:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }
        #status-hud {
            position: absolute;
            bottom: 40px;
            left: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        iframe {
            display: none; /* Background logic container */
        }
    </style>
</head>
<body>
    <div id="aquaman-shell">

    <!-- Hidden Identity Block -->

    <!-- The Nerves (Functional Logic) -->
    <script src="js/sovereign.js"></script>

    <script src="js/app.js"></script>

    <script>
