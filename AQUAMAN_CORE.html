<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUAMAN CORE | AlArab 777</title>
    <style>
        :root {
            --gold: #d4af37;
            --glass: rgba(0, 0, 0, 0.4);
            --blur: blur(30px);
            --accent: #00d2ff;
        }
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Outfit', 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        #aquaman-shell {
            width: 95vw;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-shadow: 0 0 100px rgba(0,210,255,0.1);
            position: relative;
        }
        header h1 {
            font-size: 0.8rem; /* Small letters */
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            font-weight: 200;
            color: var(--gold);
            margin: 0;
        }
        #orb {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .orb-core {
            width: 150px;
            height: 150px;
            background: #000;
            border: 1px solid var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--gold);
            animation: breathe 5s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px var(--gold); }
            50% { transform: scale(1.05); box-shadow: 0 0 70px var(--gold); }
        }
        #arsenal {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tool-link {
            font-size: 0.6rem;
            text-decoration: none;
            color: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .tool-link:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }
        #status-hud {
            position: absolute;
            bottom: 40px;
            left: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        iframe {
            display: none; /* Background logic container */
        }
    </style>
</head>
<body>
    <div id="aquaman-shell">
        <header>
            <h1>AQUAMAN CORE <span style="color: var(--gold);">V15</span></h1>
            <p style="font-size: 0.5rem; opacity: 0.3;">SOVEREIGN OS | ALPHA COMMAND</p>
        </header>

        <div id="orb">
            <div class="orb-core"></div>
        </div>

        <!-- Hidden Admin Dot -->
        <div id="admin-dot" title="Hidden Admin" style="position: absolute; bottom: 10px; right: 10px; width: 5px; height: 5px; background: rgba(212,175,55,0.2); cursor: pointer; border-radius: 50%;"></div>
        
        <div id="arsenal">
            <a href="http://localhost:3000" class="tool-link" target="_blank">CHATWOOT</a>
            <a href="http://localhost:11434" class="tool-link" target="_blank">OLLAMA</a>
            <a href="http://localhost:1234" class="tool-link" target="_blank">LM STUDIO</a>
            <a href="https://github.com/Thebigboss1978" class="tool-link" target="_blank">COMMANDER</a>
        </div>

        <!-- Voice Core (Moved from Index) -->
        <div id="voice-btn" style="position: relative; margin: 20px auto; cursor: pointer; text-align: center; font-size: 2rem;">🎙</div>
        
        <div id="status-hud">
            <div id="status-state">STANDBY</div>
            <div id="status-detail" style="font-size: 0.5rem; opacity: 0.5;">Ready</div>
            <div id="persona" style="color: var(--gold); font-size: 0.7rem;">MALIKA NASHMIAH</div>
        </div>

        <!-- Admin Panel (Password Protected) -->
        <div id="admin-panel" class="glass-panel" style="display: none; position: absolute; inset: 20px; background: rgba(0,0,0,0.9); z-index: 1000; padding: 40px; border-radius: 20px;">
            <div id="admin-login">
                <h2>ADMIN ACCESS</h2>
                <input type="password" id="admin-pwd" placeholder="Enter Password">
                <button id="admin-unlock">Unlock</button>
            </div>
            <div id="admin-settings" style="display: none;">
                <h2>SYSTEM CONFIG</h2>
                <select id="cfg-provider"><option value="openai">OpenAI</option><option value="gemini">Gemini</option><option value="elevenlabs">ElevenLabs</option></select>
                <input type="text" id="cfg-custom-model" placeholder="Model Override">
                <input type="password" id="cfg-custom-key" placeholder="API Key Override">
                <input type="text" id="cfg-11labs-agent" placeholder="ElevenLabs Agent ID">
                <button id="save-settings">Save & Reboot</button>
            </div>
        </div>

        <!-- Logs -->
        <div id="log-panel" style="display: none;">
            <div id="log-content"></div>
        </div>
    </div>

    <!-- Essential Scripts (Same as Index, but as the Master Controller) -->
    <div id="sovereign-id" data-identity="ID:ALR777|OWNER:SHARIF_ALSHAWISH_ABUELABD|...|PERSONA:malika" style="display: none;"></div>
    
    <script src="js/sovereign.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/brain.js"></script>
    <script src="js/providers/openai.js"></script>
    <script src="js/providers/gemini.js"></script>
    <script src="js/providers/elevenlabs.js"></script>
    <script src="js/providers/hume.js"></script>
    <script src="js/app.js"></script>

    <script>
        // Aquaman Custom Bindings
        document.getElementById('admin-dot').onclick = () => {
            document.getElementById('admin-panel').style.display = 'block';
        };
        document.getElementById('admin-unlock').onclick = () => {
            if(document.getElementById('admin-pwd').value === '777') {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('admin-settings').style.display = 'block';
            }
        };
    </script>
</body>
</html>
