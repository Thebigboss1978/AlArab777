<!DOCTYPE html><html lang='ar' dir='rtl'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>AlArab Club 777 | Judy OS</title><script src='https://cdn.tailwindcss.com'></script><style>::-webkit-scrollbar { display: none; } body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; } .orb { width: 250px; height: 250px; border-radius: 50%; background: #D4AF37; box-shadow: 0 0 50px rgba(212,175,55,0.4); cursor: pointer; transition: 0.5s; } .orb:active { transform: scale(0.9); } .listening { animation: pulse 1.5s infinite; background: #D4AF37; } @keyframes pulse { 0% { box-shadow: 0 0 20px #D4AF37; } 50% { box-shadow: 0 0 80px #D4AF37; } 100% { box-shadow: 0 0 20px #D4AF37; } }</style></head><body class='flex flex-col items-center justify-center h-screen'><nav class='absolute top-10 w-full flex justify-between px-10'><img src='https://github.com/user-attachments/assets/ba8432ad-a0c4-4ff2-a14e-871f800d8b65' class='w-12'><div class='text-right'><h1 class='text-[#D4AF37] font-bold tracking-widest'>JUDY OS v7.0</h1><p class='text-[10px] opacity-40 uppercase'>Sovereign AI</p></div></nav><div id='status' class='mb-10 text-[#D4AF37] font-mono text-[10px] uppercase tracking-[0.5em]'>Tap Orb to Start</div><div id='orb' class='orb flex items-center justify-center'><div class='w-20 h-20 rounded-full bg-black/20'></div></div><div id='transcript' class='mt-10 px-10 text-center text-sm text-gray-400 italic min-h-[50px]'></div><script>const orb = document.getElementById('orb'); const status = document.getElementById('status'); const transcriptDiv = document.getElementById('transcript'); let isListening = false; const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); recognition.lang = 'ar-EG'; recognition.continuous = true; recognition.onresult = (event) => { const text = event.results[event.results.length - 1][0].transcript; transcriptDiv.innerText = text; callAI(text); }; function speak(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'ar-EG'; u.pitch = 0.9; u.rate = 1.1; u.onstart = () => status.innerText = 'JUDY SPEAKING...'; u.onend = () => status.innerText = 'LISTENING...'; window.speechSynthesis.speak(u); } async function callAI(text) { status.innerText = 'THINKING...'; try { const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=ضع_مفتاحك_هنا', { method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: 'أنتِ مليكة من نزلة السمان، ردي باختصار مصري شقي لخدمة العرّاب. المستخدم قال: ' + text }] }] }) }); const data = await res.json(); const reply = data.candidates[0].content.parts[0].text; speak(reply); } catch (e) { status.innerText = 'ERROR'; } } orb.onclick = () => { if(!isListening) { recognition.start(); orb.classList.add('listening'); status.innerText = 'LISTENING...'; isListening = true; speak('أهلاً بيك يا عرّاب.. مليكة معاك، سامعاك يا باشا.'); } else { recognition.stop(); orb.classList.remove('listening'); status.innerText = 'OFFLINE'; isListening = false; } };</script></body></html>"
