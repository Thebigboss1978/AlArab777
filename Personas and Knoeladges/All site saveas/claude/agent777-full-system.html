<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent777 OS - نظام الذكاء المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #02040a 0%, #0a0e1f 50%, #02040a 100%);
            color: #e0f2ff;
            overflow: hidden;
            position: fixed;
            width: 100vw;
            height: 100vh;
        }

        /* Particles Background */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* Main Container - FULL SCREEN */
        #mainContainer {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Header - Compact */
        header {
            padding: 15px 25px;
            background: rgba(10, 15, 35, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 246, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, rgba(0,246,255,0.3), transparent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            color: #00f6ff;
            border: 2px solid rgba(0,246,255,0.3);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #00f6ff, #b794f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-btn {
            background: rgba(0, 246, 255, 0.1);
            border: 1px solid rgba(0, 246, 255, 0.3);
            border-radius: 8px;
            padding: 8px 15px;
            color: #00f6ff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            font-family: 'Cairo', sans-serif;
        }

        .header-btn:hover {
            background: rgba(0, 246, 255, 0.2);
            border-color: #00f6ff;
        }

        .agent-indicator {
            padding: 6px 12px;
            background: rgba(183, 148, 246, 0.2);
            border: 1px solid rgba(183, 148, 246, 0.4);
            border-radius: 8px;
            font-size: 0.8rem;
            color: #b794f6;
        }

        /* Chat Container - MAXIMUM SPACE */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(5, 10, 25, 0.4);
            backdrop-filter: blur(8px);
            overflow: hidden;
            min-height: 0;
        }

        #chatLog {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            min-height: 0;
        }

        #chatLog::-webkit-scrollbar {
            width: 8px;
        }

        #chatLog::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        #chatLog::-webkit-scrollbar-thumb {
            background: rgba(0, 246, 255, 0.4);
            border-radius: 10px;
        }

        #chatLog::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 246, 255, 0.6);
        }

        .message {
            padding: 16px 22px;
            border-radius: 18px;
            max-width: 80%;
            animation: slideIn 0.3s ease;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            line-height: 1.6;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: linear-gradient(135deg, #6b46c1, #553c9a);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .ai-message {
            background: rgba(0, 58, 85, 0.6);
            border: 1px solid rgba(0, 246, 255, 0.2);
            align-self: flex-start;
            border-top-left-radius: 5px;
        }

        .system-message {
            background: rgba(100, 100, 100, 0.3);
            border: 1px solid rgba(150, 150, 150, 0.2);
            align-self: center;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 60%;
        }

        .sender-name {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 6px;
            display: block;
            font-weight: bold;
        }

        /* Input Area - Clean & Spacious */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0, 246, 255, 0.15);
            flex-shrink: 0;
        }

        #promptInput {
            flex: 1;
            background: rgba(10, 15, 35, 0.7);
            border: 1.5px solid rgba(0, 246, 255, 0.3);
            border-radius: 15px;
            padding: 14px 20px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            resize: none;
            transition: all 0.3s;
            max-height: 150px;
        }

        #promptInput:focus {
            outline: none;
            border-color: #00f6ff;
            box-shadow: 0 0 20px rgba(0, 246, 255, 0.2);
            background: rgba(10, 15, 35, 0.9);
        }

        .btn {
            background: linear-gradient(135deg, #00f6ff, #0088cc);
            border: none;
            border-radius: 15px;
            padding: 14px 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
            min-width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 246, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 246, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(0, 0, 0, 0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Settings Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(10, 15, 35, 0.95);
            border: 2px solid rgba(0, 246, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 50px rgba(0, 246, 255, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 246, 255, 0.2);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00f6ff;
        }

        .close-btn {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.4);
            border-radius: 8px;
            padding: 8px 15px;
            color: #ff6b6b;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 50, 50, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #b794f6;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-input, .form-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 246, 255, 0.3);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #00f6ff;
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.2);
        }

        .form-select option {
            background: #0a0e1f;
            color: #fff;
        }

        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, #00f6ff, #0088cc);
            border: none;
            border-radius: 12px;
            padding: 15px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            margin-top: 10px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 246, 255, 0.5);
        }

        /* Agent Selector */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .agent-card {
            background: rgba(0, 246, 255, 0.05);
            border: 1px solid rgba(0, 246, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .agent-card:hover {
            background: rgba(0, 246, 255, 0.1);
            border-color: #00f6ff;
            transform: translateY(-2px);
        }

        .agent-card.active {
            background: rgba(0, 246, 255, 0.2);
            border-color: #00f6ff;
            box-shadow: 0 0 20px rgba(0, 246, 255, 0.3);
        }

        .agent-name {
            font-weight: bold;
            color: #00f6ff;
            margin-bottom: 5px;
        }

        .agent-desc {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.2rem; }
            .message { max-width: 90%; }
            .modal-content { width: 95%; padding: 20px; }
            .agent-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Particles Canvas -->
    <canvas id="particles"></canvas>

    <!-- Main Container -->
    <div id="mainContainer">
        <!-- Header -->
        <header>
            <div class="logo-section">
                <div class="logo">777</div>
                <h1>Agent777 OS</h1>
            </div>
            <div class="header-controls">
                <div class="agent-indicator" id="currentAgent">Master Agent</div>
                <button class="header-btn" onclick="openSettings()">⚙️ إعدادات</button>
                <button class="header-btn" onclick="clearChat()">🗑️ مسح</button>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="chat-container">
            <div id="chatLog"></div>
            
            <div class="input-area">
                <textarea 
                    id="promptInput" 
                    rows="1" 
                    placeholder="اكتب رسالتك هنا... (Enter للإرسال)"
                ></textarea>
                <button id="sendBtn" class="btn" onclick="handleSend()">▲</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">⚙️ إعدادات النظام</div>
                <button class="close-btn" onclick="closeSettings()">✕ إغلاق</button>
            </div>

            <!-- Agent Selection -->
            <div class="form-group">
                <div class="form-label">🤖 اختر الوكيل:</div>
                <div class="agent-grid">
                    <div class="agent-card active" onclick="selectAgent('master')">
                        <div class="agent-name">Master</div>
                        <div class="agent-desc">التحكم والتوزيع</div>
                    </div>
                    <div class="agent-card" onclick="selectAgent('expert')">
                        <div class="agent-name">Expert</div>
                        <div class="agent-desc">حل المشكلات</div>
                    </div>
                    <div class="agent-card" onclick="selectAgent('student')">
                        <div class="agent-name">Student</div>
                        <div class="agent-desc">شروح وتعلم</div>
                    </div>
                    <div class="agent-card" onclick="selectAgent('communicator')">
                        <div class="agent-name">Communicator</div>
                        <div class="agent-desc">كتابة وأسلوب</div>
                    </div>
                </div>
            </div>

            <!-- AI Source -->
            <div class="form-group">
                <label class="form-label">🧠 مصدر الذكاء الاصطناعي:</label>
                <select class="form-select" id="aiSource" onchange="toggleApiFields()">
                    <option value="local">Local AI (Ollama/LM Studio)</option>
                    <option value="openai">OpenAI</option>
                    <option value="gemini" selected>Google Gemini</option>
                    <option value="claude">Anthropic Claude</option>
                    <option value="custom">Custom Endpoint</option>
                </select>
            </div>

            <!-- API Key -->
            <div class="form-group" id="apiKeyGroup">
                <label class="form-label">🔑 API Key:</label>
                <input type="password" class="form-input" id="apiKey" placeholder="أدخل مفتاح API">
            </div>

            <!-- Local Endpoint -->
            <div class="form-group" id="localEndpointGroup" style="display: none;">
                <label class="form-label">🌐 Local Endpoint:</label>
                <input type="text" class="form-input" id="localEndpoint" placeholder="http://localhost:11434" value="http://localhost:11434">
            </div>

            <!-- Model Selection -->
            <div class="form-group">
                <label class="form-label">🎯 الموديل:</label>
                <select class="form-select" id="modelSelect">
                    <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash</option>
                    <option value="gpt-4">GPT-4</option>
                    <option value="claude-sonnet-4">Claude Sonnet 4</option>
                    <option value="llama3">Llama 3 (Local)</option>
                    <option value="qwen">Qwen (Local)</option>
                </select>
            </div>

            <!-- Google Sheets -->
            <div class="form-group">
                <label class="form-label">📊 Google Sheets Memory:</label>
                <input type="text" class="form-input" id="sheetsUrl" 
                    placeholder="https://docs.google.com/spreadsheets/d/..."
                    value="https://docs.google.com/spreadsheets/d/e/2PACX-1vTJTjrc2XpvaRgS9B11fP4vqYGRUh2umAvZOko79A17Vdc8xlyHr4mJ_QIUQsLFYKvV0E46mg-ChJvf">
            </div>

            <button class="save-btn" onclick="saveSettings()">💾 حفظ الإعدادات</button>
        </div>
    </div>

    <script>
        // ============= Configuration =============
        let CONFIG = {
            agent: 'master',
            aiSource: 'gemini',
            apiKey: 'AIzaSyBLJvnfr7CgmZmUr0uDRcMatrxbJLhaVR0',
            localEndpoint: 'http://localhost:11434',
            model: 'gemini-2.5-flash',
            sheetsUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJTjrc2XpvaRgS9B11fP4vqYGRUh2umAvZOko79A17Vdc8xlyHr4mJ_QIUQsLFYKvV0E46mg-ChJvf'
        };

        const AGENTS = {
            master: 'Master Agent',
            expert: 'Expert Agent',
            student: 'Student Agent',
            communicator: 'Communicator Agent'
        };

        // ============= DOM Elements =============
        const chatLog = document.getElementById('chatLog');
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const currentAgentEl = document.getElementById('currentAgent');
        const settingsModal = document.getElementById('settingsModal');

        let chatHistory = [];

        // ============= Load Config =============
        function loadConfig() {
            const saved = localStorage.getItem('agent777_config');
            if (saved) {
                CONFIG = { ...CONFIG, ...JSON.parse(saved) };
                updateUIFromConfig();
            }
        }

        function updateUIFromConfig() {
            currentAgentEl.textContent = AGENTS[CONFIG.agent];
            document.getElementById('aiSource').value = CONFIG.aiSource;
            document.getElementById('apiKey').value = CONFIG.apiKey;
            document.getElementById('localEndpoint').value = CONFIG.localEndpoint;
            document.getElementById('modelSelect').value = CONFIG.model;
            document.getElementById('sheetsUrl').value = CONFIG.sheetsUrl;
            toggleApiFields();
        }

        // ============= Particle System =============
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.r = Math.random() * 1.5 + 0.3;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.hue = 180 + Math.random() * 60;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < -20) this.x = canvas.width + 20;
                if (this.x > canvas.width + 20) this.x = -20;
                if (this.y < -20) this.y = canvas.height + 20;
                if (this.y > canvas.height + 20) this.y = -20;
                this.alpha += (Math.random() - 0.5) * 0.01;
                this.alpha = Math.max(0.1, Math.min(0.6, this.alpha));
            }

            draw() {
                ctx.beginPath();
                ctx.fillStyle = `hsla(${this.hue}, 90%, 60%, ${this.alpha})`;
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 250; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ============= Chat Functions =============
        function renderMessage(role, text) {
            const messageDiv = document.createElement('div');
            const className = role === 'user' ? 'user-message' : (role === 'system' ? 'system-message' : 'ai-message');
            messageDiv.className = `message ${className}`;

            const senderName = role === 'user' ? 'أنت' : (role === 'system' ? 'النظام' : AGENTS[CONFIG.agent]);

            if (role !== 'system') {
                messageDiv.innerHTML = `<span class="sender-name">${senderName}</span>${text}`;
            } else {
                messageDiv.textContent = text;
            }

            chatLog.appendChild(messageDiv);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            promptInput.disabled = isLoading;
            if (isLoading) {
                sendBtn.innerHTML = '<div class="spinner"></div>';
            } else {
                sendBtn.innerHTML = '▲';
            }
        }

        async function generateText(prompt) {
            renderMessage('user', prompt);
            chatHistory.push({ role: "user", parts: [{ text: prompt }] });
            setLoading(true);

            try {
                let response;

                if (CONFIG.aiSource === 'local') {
                    response = await callLocalAI(prompt);
                } else if (CONFIG.aiSource === 'gemini') {
                    response = await callGemini(prompt);
                } else if (CONFIG.aiSource === 'openai') {
                    response = await callOpenAI(prompt);
                } else if (CONFIG.aiSource === 'claude') {
                    response = await callClaude(prompt);
                } else {
                    response = await callCustomEndpoint(prompt);
                }

                renderMessage('ai', response);
                chatHistory.push({ role: "model", parts: [{ text: response }] });

            } catch (error) {
                console.error('AI Error:', error);
                renderMessage('system', `❌ خطأ: ${error.message}`);
            } finally {
                setLoading(false);
                saveHistory();
            }
        }

        async function callGemini(prompt) {
            const payload = {
                contents: chatHistory,
                systemInstruction: {
                    parts: [{
                        text: `أنت ${AGENTS[CONFIG.agent]} من نظام Agent777. وكيل متخصص يعمل ضمن منظومة ذكاء متكاملة. أجب بشكل مباشر ومحترف. استخدم الرموز (777، 𓂀، V) بشكل مناسب.`
                    }]
                }
            };

            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.model}:generateContent?key=${CONFIG.apiKey}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }
            );

            if (!response.ok) throw new Error(`Gemini API Error: ${response.status}`);

            const result = await response.json();
            return result?.candidates?.[0]?.content?.parts?.[0]?.text || "لا يوجد رد من النظام";
        }

        async function callLocalAI(prompt) {
            const response = await fetch(`${CONFIG.localEndpoint}/api/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: CONFIG.model,
                    prompt: prompt,
                    stream: false
                })
            });

            if (!response.ok) throw new Error(`Local AI Error: ${response.status}`);

            const result = await response.json();
            return result.response || "لا يوجد رد من النظام المحلي";
        }

        async function callOpenAI(prompt) {
            throw new Error('OpenAI integration - قم بإدخال المفتاح وإكمال التكامل');
        }

        async function callClaude(prompt) {
            throw new Error('Claude integration - قم بإدخال المفتاح وإكمال التكامل');
        }

        async function callCustomEndpoint(prompt) {
            throw new Error('Custom endpoint - قم بتحديد الـ endpoint في الإعدادات');
        }

        function saveHistory() {
            localStorage.setItem('agent777_history', JSON.stringify(chatHistory));
        }

        function loadHistory() {
            const saved = localStorage.getItem('agent777_history');
            if (saved) {
                try {
                    chatHistory = JSON.parse(saved);
                    chatLog.innerHTML = '';
                    chatHistory.forEach(item => {
                        const text = item.parts[0].text;
                        renderMessage(item.role === 'user' ? 'user' : 'ai', text);
                    });
                    if (chatHistory.length > 0) {
                        renderMessage('system', '✅ تم استعادة السجل السابق');
                    }
                } catch (e) {
                    console.error('Load error:', e);
                }
            }

            if (chatHistory.length === 0) {
                renderMessage('ai', `مرحباً! أنا ${AGENTS[CONFIG.agent]} من نظام Agent777 OS. كيف أستطيع مساعدتك؟ 777 𓂀`);
            }
        }

        function clearChat() {
            if (confirm('هل تريد مسح كل المحادثات؟')) {
                chatLog.innerHTML = '';
                chatHistory = [];
                localStorage.removeItem('agent777_history');
                renderMessage('ai', `تم مسح السجل. أنا ${AGENTS[CONFIG.agent]} جاهز للعمل 🚀`);
            }
        }

        function handleSend() {
            const text = promptInput.value.trim();
            if (text) {
                generateText(text);
                promptInput.value = '';
                promptInput.style.height = 'auto';
            }
        }

        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        promptInput.addEventListener('input', () => {
            promptInput.style.height = 'auto';
            promptInput.style.height = Math.min(promptInput.scrollHeight, 150) + 'px';
        });

        // ============= Settings Functions =============
        function openSettings() {
            settingsModal.classList.add('active');
        }

        function closeSettings() {
            settingsModal.classList.remove('active');
        }

        function selectAgent(agent) {
            CONFIG.agent = agent;
            currentAgentEl.textContent = AGENTS[agent];
            
            // Update UI
            document.querySelectorAll('.agent-card').forEach(card => {
                card.classList.remove('active');
            });
            event.target.closest('.agent-card').classList.add('active');
            
            renderMessage('system', `✅ تم التبديل إلى ${AGENTS[agent]}`);
        }

        function toggleApiFields() {
            const source = document.getElementById('aiSource').value;
            const apiKeyGroup = document.getElementById('apiKeyGroup');
            const localEndpointGroup = document.getElementById('localEndpointGroup');

            if (source === 'local') {
                apiKeyGroup.style.display = 'none';
                localEndpointGroup.style.display = 'block';
            } else {
                apiKeyGroup.style.display = 'block';
                localEndpointGroup.style.display = 'none';
            }
        }

        function saveSettings() {
            CONFIG.aiSource = document.getElementById('aiSource').value;
            CONFIG.apiKey = document.getElementById('apiKey').value;
            CONFIG.localEndpoint = document.getElementById('localEndpoint').value;
            CONFIG.model = document.getElementById('modelSelect').value;
            CONFIG.sheetsUrl = document.getElementById('sheetsUrl').value;

            localStorage.setItem('agent777_config', JSON.stringify(CONFIG));
            
            renderMessage('system', '✅ تم حفظ الإعدادات بنجاح!');
            closeSettings();
        }

        // ============= Initialize =============
        window.onload = () => {
            loadConfig();
            loadHistory();
        };

        // Close modal on outside click
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                closeSettings();
            }
        });
    </script>
</body>
</html>
